<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log/signup</title>
</head>
<style>
    body{
        padding: 10px;
        margin: 50px;
        /* background-color: aquamarine; */
    }
    .main{
        padding: 0px;
        margin: 0px;
       background-color: hwb(55 72% 4%);
       
    }
    
    
    button{
        background-color: blue;
        color: hsl(0, 18%, 97%);
    }
    button:hover{
        color: rgb(15, 229, 44);
    }
    .signUp{
        background-color: aquamarine;
        
    }
</style>
<body>
    <div class="main">
        <h2>Login Form</h2> 
        <form action="login">
            <fieldset>
                <legend>Login Page</legend>
            
            
            <label for="email">Enter your email: </label><br>
            <input type="email" placeholder="Enter your email"> <br><br>
            <label for="password">Enter your password: </label><br>
            <input type="password" placeholder="Enter your password">
            <br> <br>
            
            
            <button>Login</button> 
            <a href="#">Forgot password</a> <br>
            <p>Don't Have an account <a href="#">SignUp</a></p>


        </fieldset>
        </form>

    </div>
    <br><br><br>

    <div class="signUp"> 
        <h2>SignUp Form</h2>
        <fieldset>
            <legend> SignUp Page</legend>
        <form action="text">
            <label for="text">Enter your name</label><br>
            <input type="text" placeholder="Enter your Name"><br> <br>

            <label for="number">Enter your Age</label><br>
            <input type="number" placeholder="Enter your Age"><br> <br>

            <label for="email">Enter your email</label> 
            <br>
            <input type="email" placeholder="Enter your email"><br> <br>

            <label for="password">Enter password</label> <br>
            <input type="password" placeholder="Enter your password"><br> <br>

            <label for="password">Enter confirm password</label> <br>
            <input type="password" placeholder="Enter confirm password"> <br>
            <br>
            <input type="radio" id="male" value="male">
            <label for="male">male</label>
           
            <input type="radio" id="female" name="female" value="female">
            <label for="female">female</label>
            <br>
            
            <input type="checkbox">
            <label for="checkbox">I accepted all term's and condition</label>
            <br>
            
            <br>
            <button>SignUp</button> 
            <button type="reset">Reset</button>
            
            <p>Already Have an account <a href="#">Login</a></p>
        </fieldset>
        </form>

    </div>
</body>
</html>
