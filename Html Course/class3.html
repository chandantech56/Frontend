<html lang="en">

<head>
    <meta charset="UTF-8">

</head>

<body>
    <!-- orderd list -->
    <h2>Frontend</h2>

        <li>html</li>
        <li>css</li>
        <li>js</li>
    </ol>
    <!-- unorderd list -->
    <h2>Backend</h2>
    <ul>
        <li>java</li>
        <li>python</li>
        <li>sql</li>
    </ul>
    <!-- description list -->
    <dl>
        <dt>cold drink</dt>
        <dd>coca</dd>
        <dd>pepsi</dd>
        <dd>cold coffee</dd>
    </dl>
<!-- text formating tag -->

    <div><i>i am a italic</i></div>

    <div><em>i am emphasized</em></div>

    <div>
        <small>i am a small tag</small></div>
        <div><del>1400/-</del>
    </div>

    <div>
         <sup>a <sup>2</sup>+ b <sup>2</sup> +2ab </sup></div>
         <div><sub>h <sub>2</sub>o</sub>
    </div>
